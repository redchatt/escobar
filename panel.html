<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Admin - Escobar Control</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; max-width: 450px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; border-radius: 8px; }
        .btn { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; width: 100%; background: #27ae60; color: white; }
        .btn-red { background: #c0392b; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h2>Admin Giriş</h2>
        <input type="text" id="u" placeholder="Admin Adı">
        <input type="password" id="p" placeholder="Şifrə">
        <button class="btn" onclick="auth()">GİRİŞ</button>
    </div>

    <div id="panel" class="card" style="display:none;">
        <h2 style="color:#27ae60;">Escobar Panel</h2>
        <p>Yeni 6 rəqəmli kod:</p>
        <input type="text" id="new-c" maxlength="6">
        <input type="number" id="new-b" placeholder="Balans (₼)">
        <button class="btn" onclick="add()">Hesab Yarat</button>
        <hr style="border:1px solid #222; margin:20px 0;">
        <select id="list" onchange="showBal()"></select>
        <p>Mövcud Balans: <b id="vb" style="color:#f1c40f;">0.00</b> ₼</p>
        <input type="number" id="mb" placeholder="Məbləğ (+ və ya -)">
        <button class="btn" onclick="upd()">Balansı Dəyiş</button>
        <button class="btn btn-red" onclick="del()">Hesabı Sil</button>
        <hr>
        <p>Uduş Şansı: <span id="ch">50</span>%</p>
        <input type="range" id="rng" min="0" max="100" oninput="setCh(this.value)">
    </div>

    <script>
        function auth() {
            if(document.getElementById('u').value === "Escobar" && document.getElementById('p').value === "ali1990") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                load();
            } else { alert("Səhvdir!"); }
        }

        function add() {
            let c = document.getElementById('new-c').value;
            let b = parseFloat(document.getElementById('new-b').value) || 0;
            if(c.length !== 6) return alert("6 rəqəmli olmalıdır!");
            let accs = JSON.parse(localStorage.getItem('game_accounts')) || {};
            accs[c] = {balance: b};
            localStorage.setItem('game_accounts', JSON.stringify(accs));
            load(); alert("Uğurla yaradıldı!");
        }

        function load() {
            let accs = JSON.parse(localStorage.getItem('game_accounts')) || {};
            let sl = document.getElementById('list');
            sl.innerHTML = "<option value=''>Hesab seç...</option>";
            for(let k in accs) { sl.innerHTML += `<option value='${k}'>${k}</option>`; }
            document.getElementById('ch').innerText = localStorage.getItem('win_chance') || 50;
        }

        function showBal() {
            let k = document.getElementById('list').value;
            let accs = JSON.parse(localStorage.getItem('game_accounts'));
            if(k) document.getElementById('vb').innerText = accs[k].balance.toFixed(2);
        }

        function upd() {
            let k = document.getElementById('list').value;
            let m = parseFloat(document.getElementById('mb').value);
            if(!k || isNaN(m)) return;
            let accs = JSON.parse(localStorage.getItem('game_accounts'));
            accs[k].balance += m;
            localStorage.setItem('game_accounts', JSON.stringify(accs));
            showBal(); alert("Güncəlləndi!");
        }

        function del() {
            let k = document.getElementById('list').value;
            if(!k) return;
            let accs = JSON.parse(localStorage.getItem('game_accounts'));
            delete accs[k];
            localStorage.setItem('game_accounts', JSON.stringify(accs));
            load();
        }

        function setCh(v) {
            localStorage.setItem('win_chance', v);
            document.getElementById('ch').innerText = v;
        }
    </script>
</body>
</html>
