<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escobar Game</title>
    <style>
        body { font-family: sans-serif; background: #080808; color: #fff; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { width: 320px; padding: 25px; background: #111; border-radius: 20px; border: 1px solid #222; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #27ae60; font-size: 18px; text-align: center; }
        .btn { padding: 12px; background: #27ae60; border: none; color: white; cursor: pointer; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; }
        .balance { color: #f1c40f; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        #game-area, #import-box { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>Escobar Game</h2>
        <input type="text" id="access-code" maxlength="6" placeholder="6 Rəqəmli Kod">
        <button class="btn" onclick="login()">GİRİŞ</button>
        <p style="font-size: 10px; color: #444; margin-top: 20px; cursor: pointer;" onclick="showImport()">Məlumatı Yenilə (Admin-dən gələn kod)</p>
    </div>

    <div id="import-box" class="box">
        <h3>Məlumatı Yenilə</h3>
        <input type="text" id="import-data" placeholder="Adminin verdiyi uzun kodu bura yapışdır">
        <button class="btn" onclick="importNow()">Yadda Saxla</button>
        <button class="btn" style="background:#333" onclick="location.reload()">Geri</button>
    </div>

    <div id="game-area" class="box">
        <div class="balance" id="user-balance">0.00 ₼</div>
        <div id="st">Uğurlar!</div>
        <button class="btn" style="background:#c0392b" onclick="location.reload()">ÇIXIŞ</button>
    </div>

    <script>
        function showImport() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('import-box').style.display = 'block';
        }

        function importNow() {
            const data = document.getElementById('import-data').value;
            try {
                // Adminin göndərdiyi JSON-u yoxlayırıq
                JSON.parse(data); 
                localStorage.setItem('game_accounts', data);
                alert("Məlumatlar yeniləndi! İndi giriş edə bilərsiniz.");
                location.reload();
            } catch(e) {
                alert("Səhv kod yapışdırdınız!");
            }
        }

        function login() {
            const code = document.getElementById('access-code').value;
            let accs = JSON.parse(localStorage.getItem('game_accounts')) || {};
            if(accs[code]) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                document.getElementById('user-balance').innerText = accs[code].balance.toFixed(2) + " ₼";
            } else {
                alert("Kod tapılmadı! Admin-dən məlumatı yeniləməsini istəyin.");
            }
        }
    </script>
</body>
</html>
