<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escobar Game</title>
    <style>
        body { background: #080808; color: #fff; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { width: 320px; padding: 25px; background: #111; border-radius: 20px; border: 1px solid #222; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #27ae60; text-align: center; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: #27ae60; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }
        #game { display: none; }
        .sync-link { font-size: 10px; color: #444; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login" class="box">
        <h2 style="color:#27ae60">Escobar Game</h2>
        <input type="text" id="code" maxlength="6" placeholder="Kodu daxil et">
        <button class="btn" onclick="start()">GİRİŞ</button>
        <div class="sync-link" onclick="sync()">Sistem Kodunu Yapışdır (Admin-dən gələn)</div>
    </div>

    <div id="game" class="box">
        <h1 id="bal" style="color:#f1c40f">0.00 ₼</h1>
        <p id="st">Seçim et!</p>
        <div style="font-size:50px; margin:20px 0;">
            <span onclick="play('daş')" style="cursor:pointer">✊</span>
            <span onclick="play('kağız')" style="cursor:pointer">✋</span>
            <span onclick="play('qayçı')" style="cursor:pointer">✌️</span>
        </div>
        <button class="btn" style="background:#333" onclick="location.reload()">ÇIXIŞ</button>
    </div>

    <script>
        let cur = null;
        function sync() {
            let p = prompt("Admin-dən gələn uzun kodu bura yapışdırın:");
            if(p) {
                try {
                    let d = JSON.parse(atob(p));
                    localStorage.setItem('game_accounts', JSON.stringify(d.accs));
                    localStorage.setItem('win_chance', d.win);
                    alert("Sistem yeniləndi! İndi giriş edə bilərsiniz.");
                } catch(e) { alert("Səhv kod!"); }
            }
        }

        function start() {
            let c = document.getElementById('code').value;
            let a = JSON.parse(localStorage.getItem('game_accounts')) || {};
            if(a[c]) {
                cur = c;
                document.getElementById('login').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                document.getElementById('bal').innerText = a[cur].balance.toFixed(2) + " ₼";
            } else { alert("Giriş kodunuz tapılmadı!"); }
        }

        function play(u) {
            let a = JSON.parse(localStorage.getItem('game_accounts'));
            let ch = localStorage.getItem('win_chance') || 50;
            let win = Math.random() * 100 < ch;
            
            // Sadələşdirilmiş məntiq: Əgər balans varsa çıx, udsa gəl (test üçün 1 manat)
            if(a[cur].balance < 1) return alert("Balans yetmir!");
            a[cur].balance -= 1;
            
            if(win) {
                a[cur].balance += 2;
                document.getElementById('st').innerText = "UDDUNUZ!";
                document.getElementById('st').style.color = "#2ecc71";
            } else {
                document.getElementById('st').innerText = "UDUZDUNUZ!";
                document.getElementById('st').style.color = "#e74c3c";
            }
            
            localStorage.setItem('game_accounts', JSON.stringify(a));
            document.getElementById('bal').innerText = a[cur].balance.toFixed(2) + " ₼";
        }
    </script>
</body>
</html>
